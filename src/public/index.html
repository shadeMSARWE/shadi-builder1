<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>FERDOUS AI Studio</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
  font-family:Tajawal;
  background:#010409;
  color:#fff;
}
.glass{
  background:rgba(15,23,42,.75);
  backdrop-filter:blur(16px);
  border:1px solid #1e293b;
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center">

  <div class="glass p-14 rounded-3xl max-w-xl w-full text-center">
    <h1 class="text-5xl font-black mb-6">
      FERDOUS <span class="text-amber-400">AI</span>
    </h1>

    <p class="text-slate-400 text-lg mb-10">
      ابنِ مواقع احترافية بالذكاء الاصطناعي  
      <br>  
      FERDOUS AI — Premium AI Studio.
    </p>

    <a href="/login.html"
       class="inline-block bg-indigo-600 hover:bg-indigo-500 px-12 py-4 rounded-2xl font-black text-lg">
      🚀 ابدأ الآن
    </a>
  </div>

  <!-- ✅ AUTH CHECK – FINAL -->
  <script>
    document.addEventListener("DOMContentLoaded", async () => {

      const supabase = window.supabase.createClient(
        "https://xfzelmpwthqywidyjgzo.supabase.co",
        "sb_publishable_1T-D3i1El5LLR94ev4RQWA_2zRULS9H",
        {
          auth: {
            detectSessionInUrl: true,
            persistSession: true
          }
        }
      );

      const { data, error } = await supabase.auth.getSession();

      if (error) {
        console.error("Auth error:", error);
        return;
      }

      if (data?.session) {
        // خزّن التوكن
        localStorage.setItem("token", data.session.access_token);

        // نظّف الرابط
        window.history.replaceState({}, "", "/");

        // 🔥 تحويل إجباري بدون رجعة
        window.location.replace("/generate.html");
      }

    });
  </script>

</body>
</html>
