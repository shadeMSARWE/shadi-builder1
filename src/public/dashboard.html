<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Dashboard | Shadi AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{font-family:Tajawal;background:#010409;color:#fff}
.glass{background:rgba(15,23,42,.75);backdrop-filter:blur(16px);border:1px solid #1e293b}
</style>
</head>

<body class="h-screen flex overflow-hidden">

<!-- 🔑 OAUTH TOKEN CAPTURE (أهم سطر بالمشروع) -->
<script>
/*
  التقاط access_token من Supabase OAuth
*/
(function () {
  if (window.location.hash.includes("access_token")) {
    const hash = new URLSearchParams(
      window.location.hash.substring(1)
    );

    const accessToken = hash.get("access_token");

    if (accessToken) {
      localStorage.setItem("token", accessToken);

      // تنظيف الرابط من #access_token
      window.history.replaceState(
        {},
        document.title,
        window.location.pathname
      );
    }
  }
})();
</script>

<!-- SIDEBAR -->
<aside class="w-[340px] glass flex flex-col p-6 gap-6">

  <div>
    <h1 class="text-2xl font-black tracking-tight">
      SHADI <span class="text-indigo-500">AI</span>
    </h1>
    <p id="plan" class="text-xs text-slate-400 mt-1">Loading...</p>
  </div>

  <nav class="flex flex-col gap-3 text-sm font-bold">
    <a href="/dashboard.html" class="bg-slate-800 px-4 py-3 rounded-xl">⚡ Builder</a>
    <a href="/projects.html" class="px-4 py-3 rounded-xl hover:bg-slate-800">📁 Projects</a>
    <a href="/pricing.html" class="px-4 py-3 rounded-xl hover:bg-slate-800">💳 Pricing</a>
  </nav>

  <div class="mt-auto">
    <button onclick="logout()" class="w-full bg-red-600 hover:bg-red-500 py-3 rounded-xl font-bold">
      Logout
    </button>
  </div>

</aside>

<!-- MAIN -->
<main class="flex-1 p-10 overflow-y-auto">

  <h2 class="text-4xl font-black mb-6">⚙️ AI Website Builder</h2>
  <p class="text-slate-400 mb-10">
    اكتب الوصف — والباقي علينا.
  </p>

  <textarea id="desc"
    class="w-full bg-slate-900 border border-slate-700 rounded-2xl p-6 h-40 text-lg mb-6"
    placeholder="مثال: موقع SaaS لشركة تقنية فخمة، ألوان داكنة، أسلوب Manus..."></textarea>

  <button onclick="build()"
    class="bg-indigo-600 hover:bg-indigo-500 px-10 py-4 rounded-2xl font-black text-lg">
    🚀 ابدأ البناء
  </button>

  <div id="previewWrap" class="hidden mt-12">
    <h3 class="text-2xl font-black mb-4">🔍 المعاينة</h3>
    <iframe id="preview"
      class="w-full h-[600px] rounded-3xl border border-slate-800 bg-white"></iframe>
  </div>

</main>

<!-- APP LOGIC -->
<script>
const token = localStorage.token;

// لو ما في توكن → رجّع لصفحة الدخول
if (!token) location.href = "/login.html";

function logout(){
  localStorage.clear();
  location.href = "/";
}

// تحميل بيانات المستخدم
fetch("/api/v1/users/me",{
  headers:{ Authorization:"Bearer "+token }
})
.then(r=>r.json())
.then(u=>{
  document.getElementById("plan").innerText =
    u.plan.toUpperCase()+" • "+u.usage+"/"+u.maxUsage+" builds";

  if(u.plan==="free" && u.usage>=u.maxUsage){
    location.href="/pricing.html";
  }
});

// بناء الموقع
function build(){
  const desc = document.getElementById("desc").value.trim();
  if(!desc) return alert("اكتب وصف أولاً");

  fetch("/api/v1/projects/analyze",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({ description:desc })
  })
  .then(r=>r.json())
  .then(d=>{
    if(!d.ok) return alert(d.error||"Error");

    document.getElementById("previewWrap").classList.remove("hidden");
    document.getElementById("preview").src = d.previewUrl;
  });
}
</script>

</body>
</html>
