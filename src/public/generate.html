<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Generate</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
body{font-family:Tajawal;background:#020617;color:#fff}
.glass{background:rgba(15,23,42,.7);backdrop-filter:blur(14px)}
</style>
</head>
<body class="flex h-screen">

<aside class="w-80 glass p-6 border-l border-slate-800">
<a href="/dashboard.html" class="block mb-6">← رجوع</a>
</aside>

<main class="flex-1 p-10">
<h1 class="text-3xl font-black mb-6">ابنِ موقعك</h1>
<textarea id="desc" class="w-full h-40 bg-slate-900 p-4 rounded-xl"></textarea>
<button onclick="gen()" class="mt-6 bg-indigo-600 px-10 py-4 rounded-xl font-bold">Generate</button>

<iframe id="preview" class="w-full h-[60vh] mt-8 rounded-xl bg-white"></iframe>
</main>

<script>
async function gen(){
const r=await fetch("/api/v1/brain/analyze",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+localStorage.token
},
body:JSON.stringify({description:desc.value})
});
const d=await r.json();
preview.src=d.previewUrl;
}
</script>

</body>
</html>
