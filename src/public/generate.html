<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Generate | Shadi Builder</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
  font-family:Tajawal;
  background:#020617;
  color:#fff
}
.glass{
  background:rgba(15,23,42,.7);
  backdrop-filter:blur(14px);
  border:1px solid #1e293b
}
</style>
</head>

<body class="flex h-screen">

<!-- 🔐 AUTH CHECK + TOKEN CAPTURE (FINAL FIX) -->
<script>
document.addEventListener("DOMContentLoaded", async () => {

  const supabase = window.supabase.createClient(
    "https://xfzelmpwthqywidyjgzo.supabase.co",
    "sb_publishable_1T-D3i1El5LLR94ev4RQWA_2zRULS9H",
    {
      auth: {
        detectSessionInUrl: true,
        persistSession: true
      }
    }
  );

  const { data, error } = await supabase.auth.getSession();

  if (error || !data?.session) {
    window.location.replace("/login.html");
    return;
  }

  // خزّن التوكن
  localStorage.setItem("token", data.session.access_token);

  // نظّف الرابط من #access_token
  window.history.replaceState(
    {},
    document.title,
    window.location.pathname
  );

  // خلي Supabase متاح بكل الصفحة
  window.supabaseClient = supabase;
});
</script>

<!-- SIDEBAR -->
<aside class="w-80 glass p-6 border-l border-slate-800 flex flex-col">
  <h2 class="text-xl font-black mb-6">⚙️ Shadi Builder</h2>

  <button onclick="logout()"
    class="mt-auto w-full bg-red-600 hover:bg-red-500 py-3 rounded-xl font-bold">
    Logout
  </button>
</aside>

<!-- MAIN -->
<main class="flex-1 p-10 overflow-y-auto">

  <h1 class="text-3xl font-black mb-6">ابنِ موقعك بالذكاء الاصطناعي</h1>

  <textarea id="desc"
    class="w-full h-40 bg-slate-900 p-4 rounded-xl border border-slate-700 mb-6"
    placeholder="مثال: موقع SaaS فخم لشركة تقنية..."></textarea>

  <button id="buildBtn" onclick="gen()"
    class="bg-indigo-600 hover:bg-indigo-500 px-10 py-4 rounded-xl font-bold">
    🚀 Generate
  </button>

  <iframe id="preview"
    class="w-full h-[60vh] mt-10 rounded-xl bg-white hidden"></iframe>

</main>

<script>
async function gen(){
  const description = document.getElementById("desc").value.trim();
  if(!description) return alert("اكتب وصف الموقع أولاً");

  const token = localStorage.getItem("token");
  if(!token){
    location.href="/login.html";
    return;
  }

  const btn = document.getElementById("buildBtn");
  btn.disabled = true;
  btn.innerText = "⏳ جاري البناء...";

  try{
    const r = await fetch("/api/v1/brain/analyze",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + token
      },
      body:JSON.stringify({ description })
    });

    const d = await r.json();

    if(!d.ok) throw new Error(d.error || "Build failed");

    const iframe = document.getElementById("preview");
    iframe.src = d.previewUrl;
    iframe.classList.remove("hidden");

  }catch(err){
    alert(err.message);
  }

  btn.disabled = false;
  btn.innerText = "🚀 Generate";
}

async function logout(){
  await window.supabaseClient.auth.signOut();
  localStorage.clear();
  location.href="/";
}
</script>

</body>
</html>
