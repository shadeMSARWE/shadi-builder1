<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADI BUILDER | Generation Engine</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #6366f1; --accent: #a855f7; --bg: #030712; }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.1) 0%, transparent 40%);
            color: #f3f4f6;
            overflow-x: hidden;
        }

        .glass-sidebar { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(30px); border-left: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(30, 41, 59, 0.3); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        
        /* Loading Overlay Style */
        #loadingOverlay {
            background: rgba(3, 7, 18, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: none;
        }

        .neon-spinner {
            width: 80px;
            height: 80px;
            border: 4px solid transparent;
            border-top: 4px solid var(--primary);
            border-bottom: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .shadi-logo {
            background: linear-gradient(to right, #fff, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .btn-premium {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            transition: all 0.3s ease;
        }

        .btn-premium:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.5);
        }

        .btn-premium:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>

<body class="flex h-screen overflow-hidden">

    <div id="loadingOverlay" class="fixed inset-0 flex flex-col items-center justify-center">
        <div class="neon-spinner mb-8"></div>
        <div id="loadingStatus" class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">
            جاري تحضير المحرك...
        </div>
        <p class="text-slate-500 mt-4 text-sm tracking-widest animate-pulse">SHADI AI VISION X IS WORKING</p>
    </div>

    <aside class="w-72 glass-sidebar p-8 flex flex-col shadow-2xl">
        <div class="mb-12">
            <h2 class="text-2xl shadi-logo tracking-tighter">SHADI BUILDER</h2>
            <p class="text-[10px] text-slate-500 mt-1 uppercase tracking-[0.2em] font-black">Manus-Vision-X Engine</p>
        </div>

        <div class="space-y-3">
            <div class="p-4 rounded-2xl bg-indigo-500/5 border border-indigo-500/10">
                <p class="text-xs text-indigo-400 font-bold mb-1">PRO PLAN</p>
                <p class="text-[10px] text-slate-500">تم تفعيل كافة ميزات الذكاء الاصطناعي</p>
            </div>
        </div>

        <button onclick="logout()" class="mt-auto group flex items-center justify-center gap-3 text-slate-500 hover:text-white transition-all py-3 border border-white/5 rounded-xl hover:bg-white/5">
            <span class="text-sm font-bold">تسجيل خروج</span>
        </button>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto relative">
        <div class="max-w-5xl mx-auto">
            <header class="mb-10 text-center">
                <h1 class="text-6xl font-black mb-4 tracking-tight">ابني مستقبلك <span class="text-indigo-500">بلمحة</span></h1>
                <p class="text-slate-500 text-lg">أدخل وصف الموقع الذي تتخيله، وسأقوم ببنائه وتجهيزه لك في ثوانٍ.</p>
            </header>

            <div class="glass-card rounded-[2.5rem] p-3 shadow-2xl mb-10">
                <textarea id="desc" 
                    class="w-full h-40 bg-transparent p-6 text-xl outline-none resize-none placeholder:text-slate-700 font-medium"
                    placeholder="مثال: ابني لي بنك إلكتروني عصري بستايل نيون مع صفحات لوحة تحكم..."></textarea>
                
                <div class="flex items-center justify-between p-4 bg-white/5 rounded-[2rem] border border-white/5">
                    <div class="flex items-center gap-2 text-slate-500">
                        <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                        <span class="text-xs font-bold uppercase tracking-widest">System Ready</span>
                    </div>
                    <button id="buildBtn" onclick="gen()" class="btn-premium px-10 py-4 rounded-2xl font-black text-white text-sm">
                        🚀 ابدأ السحر الآن
                    </button>
                </div>
            </div>

            <div id="previewContainer" class="hidden">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-3">
                        <div class="px-4 py-1.5 rounded-full bg-green-500/10 border border-green-500/20 text-green-400 text-[10px] font-black uppercase tracking-widest">
                            Live Environment
                        </div>
                    </div>
                    <button id="downloadBtn" class="bg-white/10 hover:bg-white/20 text-white px-6 py-2 rounded-xl text-xs font-bold transition flex items-center gap-2">
                        <span>📦 تحميل ملفات الموقع (ZIP)</span>
                    </button>
                </div>
                <div class="rounded-[2.5rem] overflow-hidden border border-white/10 shadow-[0_0_50px_rgba(0,0,0,0.5)]">
                    <iframe id="preview" class="w-full h-[70vh] bg-white border-none"></iframe>
                </div>
            </div>
        </div>
    </main>

    <script>
        const supabase = window.supabase.createClient(
            "https://xfzelmpwthqywidyjgzo.supabase.co",
            "sb_publishable_1T-D3i1El5LLR94ev4RQWA_2zRULS9H"
        );

        // نظام الحماية والدخول
        document.addEventListener("DOMContentLoaded", async () => {
            const { data } = await supabase.auth.getSession();
            if (!data?.session) { window.location.replace("/login.html"); return; }
            localStorage.setItem("token", data.session.access_token);
        });

        async function gen() {
            const description = document.getElementById("desc").value.trim();
            if(!description) return;

            const overlay = document.getElementById("loadingOverlay");
            const statusText = document.getElementById("loadingStatus");
            const token = localStorage.getItem("token");

            // بدء تجربة "الواو"
            overlay.style.display = "flex";
            
            const steps = [
                "🔍 جاري تحليل فكرتك العبقرية...",
                "🎨 استحضار الألوان والصور المناسبة...",
                "🏗️ بناء الهيكل البرمجي للموقع...",
                "✨ وضع اللمسات الأخيرة للتصميم..."
            ];

            let stepIdx = 0;
            const stepInterval = setInterval(() => {
                if(stepIdx < steps.length) {
                    statusText.innerText = steps[stepIdx];
                    stepIdx++;
                }
            }, 1500);

            try {
                const r = await fetch("/api/v1/brain/analyze", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({ description })
                });

                const d = await r.json();
                if(!d.ok) throw new Error(d.error);

                // تجهيز المعاينة
                const iframe = document.getElementById("preview");
                iframe.src = d.previewUrl;
                document.getElementById("previewContainer").classList.remove("hidden");
                
                // ربط زر التحميل
                const siteId = d.previewUrl.split('/').pop();
                document.getElementById("downloadBtn").onclick = () => {
                    window.location.href = `/api/v1/projects/export/${siteId}`;
                };

                setTimeout(() => {
                    overlay.style.display = "none";
                    clearInterval(stepInterval);
                    iframe.scrollIntoView({ behavior: 'smooth' });
                }, 1000);

            } catch(err) {
                overlay.style.display = "none";
                clearInterval(stepInterval);
                alert("❌ فشل البناء: " + err.message);
            }
        }

        async function logout() {
            await supabase.auth.signOut();
            localStorage.clear();
            location.href = "/login.html";
        }
    </script>
</body>
</html>
