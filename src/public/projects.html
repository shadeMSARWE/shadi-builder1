<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Projects | Shadi AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
body{font-family:Tajawal;background:#020617;color:#fff}
.glass{background:rgba(15,23,42,.7);backdrop-filter:blur(14px);border:1px solid #1e293b}
</style>
</head>

<body class="min-h-screen p-10">

<!-- HEADER -->
<div class="flex justify-between items-center mb-12">
  <h1 class="text-4xl font-black">📁 مشاريعي</h1>
  <a href="/dashboard.html" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-3 rounded-xl font-bold">
    + مشروع جديد
  </a>
</div>

<!-- PROJECTS GRID -->
<div id="projects" class="grid md:grid-cols-2 xl:grid-cols-3 gap-8"></div>

<!-- EMPTY STATE -->
<div id="empty" class="hidden text-center text-slate-400 mt-32">
  <p class="text-2xl font-bold mb-4">😴 لا يوجد مشاريع بعد</p>
  <a href="/dashboard.html" class="text-indigo-400 underline">ابدأ أول مشروع</a>
</div>

<script>
const token = localStorage.token;

fetch("/api/v1/projects/list",{
  headers:{ Authorization:"Bearer "+token }
})
.then(r=>r.json())
.then(d=>{
  if(!d.projects || d.projects.length===0){
    document.getElementById("empty").classList.remove("hidden");
    return;
  }

  document.getElementById("projects").innerHTML =
    d.projects.map(p=>`
      <div class="glass rounded-3xl p-6 flex flex-col justify-between">
        <div>
          <h2 class="text-xl font-black mb-2">${p.name}</h2>
          <p class="text-xs text-slate-400 mb-6">
            ${new Date(p.createdAt).toLocaleString()}
          </p>
        </div>

        <div class="flex gap-3">
          <a href="/generated/${p.id}/index.html" target="_blank"
            class="flex-1 text-center bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-xl font-bold">
            فتح
          </a>

          <button onclick="del('${p.id}')"
            class="flex-1 bg-red-600 hover:bg-red-500 px-4 py-2 rounded-xl font-bold">
            حذف
          </button>
        </div>
      </div>
    `).join("");
});

function del(id){
  if(!confirm("متأكد من حذف المشروع؟")) return;

  fetch("/api/v1/projects/"+id,{
    method:"DELETE",
    headers:{ Authorization:"Bearer "+token }
  }).then(()=>location.reload());
}
</script>

</body>
</html>
